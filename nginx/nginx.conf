events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:4000;
    }

    server {
        listen 80;

        # API routes -> backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend root (exact match, highest priority)
        location = / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }

        # Frontend static assets from Vite build
        location /assets/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }

        # Known static file extensions -> frontend
        location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot|css|js|json|txt|map)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }

        # All other paths (short codes) -> backend
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
